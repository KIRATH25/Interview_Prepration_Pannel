<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InterviewX - AI Interview Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: "#09090b", // neutral-950
              surface: "#18181b", // neutral-900
              primary: "#8b5cf6", // violet-500
              secondary: "#06b6d4", // cyan-500
              accent: "#3b82f6", // blue-500
            },
            animation: {
              spotlight: "spotlight 2s ease .75s 1 forwards",
            },
            keyframes: {
              spotlight: {
                "0%": {
                  opacity: 0,
                  transform: "translate(-72%, -62%) scale(0.5)",
                },
                "100%": {
                  opacity: 1,
                  transform: "translate(-50%,-40%) scale(1)",
                },
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Custom scrollbar for dark theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "clsx": "https://esm.sh/clsx@^2.1.1",
    "zustand": "https://esm.sh/zustand@^5.0.9",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^3.4.0",
    "@tabler/icons-react": "https://esm.sh/@tabler/icons-react@^3.36.0",
    "canvas-confetti": "https://esm.sh/canvas-confetti@^1.9.3",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.39.0",
    "zustand/": "https://esm.sh/zustand@^5.0.10/"
  }
}
</script>
</head>
  <body class="bg-background text-neutral-200 antialiased overflow-hidden">
    <div id="root"></div>
  </body>
</html>
